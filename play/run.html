<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKAOs - Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpg" href="../img/logo.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', 'Impact', sans-serif;
            user-select: none;
            -webkit-user-drag: none;
        }
        img {
            pointer-events: none;
        }
        body {
            background: url('../img/fn/f1.jpg') no-repeat center center/cover;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            position: relative;
        }
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            display: none;
        }
        .lobby-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 10;
            background: url('../img/fn/f1.jpg') no-repeat center center/cover;
        }
        .left-slash-partition {
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.95) 0%, rgba(20, 20, 20, 0.95) 75%, transparent 75.1%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 8%;
            position: relative;
        }
        .logo-container {
            max-width: 280px;
            margin-bottom: 30px;
        }
        .logo-container img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.6));
        }
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .btn-mode {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            cursor: pointer;
            position: relative;
            height: 70px;
            width: 420px;
            transition: transform 0.1s ease;
        }
        .btn-mode .icon-wrapper {
            width: 75px;
            height: 100%;
            background: #262626;
            border: 4px solid #ffffff;
            transform: skewX(-25deg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 3;
            box-shadow: -5px 5px 0px rgba(0,0,0,0.5);
            transition: background-color 0.1s ease, border-color 0.1s ease;
        }
        .btn-mode .icon-wrapper svg {
            width: 46px;
            height: 46px;
            object-fit: contain;
            transform: skewX(25deg);
            fill: #ffffff;
            transition: filter 0.1s ease, fill 0.1s ease;
        }
        .btn-mode .slash-fold {
            width: 25px;
            height: 100%;
            background: #0f0f0f;
            transform: skewX(-25deg);
            margin-left: -10px;
            z-index: 2;
            border-top: 4px solid #ffffff;
            border-bottom: 4px solid #ffffff;
            transition: background-color 0.1s ease, border-color 0.1s ease;
        }
        .btn-mode .text-wrapper {
            flex: 1;
            height: 100%;
            background: #141414;
            border: 4px solid #ffffff;
            border-left: none;
            transform: skewX(-25deg);
            margin-left: -10px;
            display: flex;
            align-items: center;
            padding-left: 25px;
            z-index: 1;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.5);
            transition: background-color 0.1s ease, border-color 0.1s ease, color 0.1s ease;
        }
        .btn-mode span {
            transform: skewX(25deg);
            font-weight: 900;
            font-size: 1.8rem;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            transition: text-shadow 0.1s ease;
        }
        .btn-mode:hover {
            transform: scale(1.03) translate3d(5px, 0, 0);
        }
        .btn-mode:hover .icon-wrapper {
            background-color: #ffffff;
            border-color: #000000;
        }
        .btn-mode:hover .icon-wrapper svg {
            fill: #000000;
        }
        .btn-mode:hover .slash-fold {
            background-color: #e0e0e0;
            border-color: #000000;
        }
        .btn-mode:hover .text-wrapper {
            background-color: #ffffff;
            border-color: #000000;
            color: #000000;
        }
        .btn-mode:hover span {
            text-shadow: none;
        }
        .btn-mode.selected-active {
            transform: scale(1.03) translate3d(5px, 0, 0);
            z-index: 15;
        }
        .btn-mode.selected-active .icon-wrapper {
            background-color: #ffffff;
            border-color: #000000;
        }
        .btn-mode.selected-active .icon-wrapper svg {
            fill: #000000;
        }
        .btn-mode.selected-active .slash-fold {
            background-color: #e0e0e0;
            border-color: #000000;
        }
        .btn-mode.selected-active .text-wrapper {
            background-color: #ffffff;
            border-color: #000000;
            color: #000000;
        }
        .btn-mode.selected-active span {
            text-shadow: none;
        }
        .right-content-partition {
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-right: 5%;
            z-index: 10;
        }
        .music-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transform: rotate(2deg) skewX(-12deg);
            gap: 15px;
            width: 320px;
        }
        .music-art-frame {
            width: 190px;
            height: 190px;
            background-color: #222222;
            border: 4px solid #ffffff;
            overflow: hidden;
            box-shadow: -6px 6px 0px rgba(0,0,0,0.8);
            transform: skewX(12deg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .music-art-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .music-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: skewX(12deg);
        }
        .music-title {
            font-size: 2rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: -3px 3px 0px rgba(0,0,0,0.8);
            margin-top: 5px;
        }
        .game-layout {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .game-layout.active {
            opacity: 1;
            pointer-events: auto;
        }
        .tracks-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            justify-content: space-between;
            border-left: 2px dashed rgba(255, 255, 255, 0.1);
            border-right: 2px dashed rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            overflow: hidden;
        }
        .track-column {
            position: relative;
            width: 25%;
            height: 100%;
            display: flex;
            justify-content: center;
        }
        .receptors-row {
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 110;
        }
        .receptor-box {
            width: 25%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .receptor {
            width: 64px;
            height: 64px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.05s ease;
        }
        .arrow-icon {
            width: 56px;
            height: 56px;
            background-color: rgba(255, 255, 255, 0.3);
            -webkit-mask-image: url('../img/assets/arrow.png');
            mask-image: url('../img/assets/arrow.png');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
        }
        .dir-left { transform: rotate(180deg); }
        .dir-up { transform: rotate(270deg); }
        .dir-down { transform: rotate(90deg); }
        .dir-right { transform: rotate(0deg); }
        .col-0 .receptor.active .arrow-icon { background-color: #ff2a74; filter: drop-shadow(0 0 15px #ff2a74); }
        .col-1 .receptor.active .arrow-icon { background-color: #00f2fe; filter: drop-shadow(0 0 15px #00f2fe); }
        .col-2 .receptor.active .arrow-icon { background-color: #39ff14; filter: drop-shadow(0 0 15px #39ff14); }
        .col-3 .receptor.active .arrow-icon { background-color: #ffb800; filter: drop-shadow(0 0 15px #ffb800); }
        .receptor.active {
            transform: scale(1.15);
        }
        .note {
            position: absolute;
            left: 50%;
            top: 0;
            transform: translate3d(-50%, 0, 0);
            width: 64px;
            height: 64px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 105;
            will-change: transform;
        }
        .note .arrow-icon {
            width: 56px;
            height: 56px;
        }
        .n-left .arrow-icon { background-color: #ff2a74; filter: drop-shadow(0 0 10px #ff2a74); }
        .n-up .arrow-icon { background-color: #00f2fe; filter: drop-shadow(0 0 10px #00f2fe); }
        .n-down .arrow-icon { background-color: #39ff14; filter: drop-shadow(0 0 10px #39ff14); }
        .n-right .arrow-icon { background-color: #ffb800; filter: drop-shadow(0 0 10px #ffb800); }
        .countdown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 150;
            background: rgba(0,0,0,0.4);
        }
        .countdown-text {
            font-size: 6rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: -4px 4px 0px #000000, 0 0 30px rgba(255,255,255,0.6);
            transform: scale(0.5);
            opacity: 0;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s;
        }
        .countdown-text.pop {
            transform: scale(1.2);
            opacity: 1;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <video id="bgVideo" class="bg-video" loop muted></video>
    <audio id="bgMusic"></audio>
    <div class="lobby-screen" id="lobbyViewport">
        <div class="left-slash-partition">
            <div class="logo-container">
                <img src="../img/logo.png" alt="Logo OKAOs">
            </div>
            <div class="menu-container">
                <div class="btn-mode" id="btnRun">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24">
                            <path d="M8,5.14V19.14L19,12.14L8,5.14Z"/>
                        </svg>
                    </div>
                    <div class="slash-fold"></div>
                    <div class="text-wrapper">
                        <span>Run</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="right-content-partition">
            <div class="music-panel">
                <div class="music-art-frame">
                    <img id="songArt" src="../img/logo.jpg" alt="Song Art" onerror="this.src='../img/logo.jpg'">
                </div>
                <div class="music-info">
                    <span class="music-title" id="songTitle">Unknown Track</span>
                </div>
            </div>
        </div>
    </div>
    <div class="game-layout" id="gameViewport">
        <div class="countdown-overlay" id="countdownOverlay">
            <div class="countdown-text" id="countdownText">3</div>
        </div>
        <div class="tracks-container">
            <div class="receptors-row">
                <div class="receptor-box col-0">
                    <div class="receptor" id="receptor-0">
                        <div class="arrow-icon dir-left"></div>
                    </div>
                </div>
                <div class="receptor-box col-1">
                    <div class="receptor" id="receptor-1">
                        <div class="arrow-icon dir-up"></div>
                    </div>
                </div>
                <div class="receptor-box col-2">
                    <div class="receptor" id="receptor-2">
                        <div class="arrow-icon dir-down"></div>
                    </div>
                </div>
                <div class="receptor-box col-3">
                    <div class="receptor" id="receptor-3">
                        <div class="arrow-icon dir-right"></div>
                    </div>
                </div>
            </div>
            <div class="track-column" id="track-0"></div>
            <div class="track-column" id="track-1"></div>
            <div class="track-column" id="track-2"></div>
            <div class="track-column" id="track-3"></div>
        </div>
    </div>
    <script>
        const state = {
            isPlaying: false
        };

        const ENGINE = {
            ready: false,
            songData: null,
            notes: [],
            travelMs: 1200,
            hitWindows: { perfect: 45, comun: 90, okay: 140 },
            rafId: null,
            columnRects: [{ height: 0, receptorY: 0 }, { height: 0, receptorY: 0 }, { height: 0, receptorY: 0 }, { height: 0, receptorY: 0 }],
            clockStartPerf: 0,
            audioStarted: false
        };

        const DIR_NOTE_CLASS = ['n-left', 'n-up', 'n-down', 'n-right'];
        const DIR_ARROW_CLASS = ['dir-left', 'dir-up', 'dir-down', 'dir-right'];
        const BASE_TRAVEL_MS = 1200;
        const MIN_TRAVEL_MS = 500;
        const MAX_TRAVEL_MS = 2600;
        const MAX_RECONNECT_ATTEMPTS = 2;
        const EXIT_FADE_MS = 260;

        const lobbyViewport = document.getElementById('lobbyViewport');
        const gameViewport = document.getElementById('gameViewport');
        const countdownOverlay = document.getElementById('countdownOverlay');
        const countdownText = document.getElementById('countdownText');
        const btnRun = document.getElementById('btnRun');
        const songArt = document.getElementById('songArt');
        const songTitle = document.getElementById('songTitle');
        const bgVideo = document.getElementById('bgVideo');
        const bgMusic = document.getElementById('bgMusic');

        const receptors = [
            document.getElementById('receptor-0'),
            document.getElementById('receptor-1'),
            document.getElementById('receptor-2'),
            document.getElementById('receptor-3')
        ];

        const trackColumns = [
            document.getElementById('track-0'),
            document.getElementById('track-1'),
            document.getElementById('track-2'),
            document.getElementById('track-3')
        ];

        function resolveSongSelection() {
            const params = new URLSearchParams(window.location.search);
            const urlId = params.get('id') || params.get('song') || params.get('cancion');
            if (urlId) return urlId;
            const storedId = localStorage.getItem('selectedSongId');
            if (storedId) {
                localStorage.removeItem('selectedSongId');
                localStorage.removeItem('selectedSong');
                return storedId;
            }
            const storedSong = localStorage.getItem('selectedSong');
            if (storedSong) {
                localStorage.removeItem('selectedSong');
                localStorage.removeItem('selectedSongId');
                try {
                    const parsed = JSON.parse(storedSong);
                    if (parsed && parsed.id) return parsed.id;
                } catch (err) {}
            }
            return null;
        }

        function extractNumber(raw) {
            const match = String(raw).match(/\d+/);
            return match ? match[0] : null;
        }

        function buildMapUrl(num) {
            return '../mapped/m' + num + '.json';
        }

        function generateToken() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        }

        function saveReconnect(songId, token) {
            let attempts = 0;
            try {
                const prevRaw = localStorage.getItem('okaosReconnect');
                if (prevRaw) {
                    const prev = JSON.parse(prevRaw);
                    if (prev.songId === songId) attempts = (prev.attempts || 0) + 1;
                }
            } catch (err) {}
            localStorage.setItem('okaosReconnect', JSON.stringify({ songId: songId, token: token, attempts: attempts }));
            const url = new URL(window.location.href);
            url.searchParams.set('token', token);
            history.replaceState(null, '', url.toString());
            return attempts;
        }

        function clearReconnect() {
            localStorage.removeItem('okaosReconnect');
            localStorage.removeItem('selectedSong');
            localStorage.removeItem('selectedSongId');
            const url = new URL(window.location.href);
            if (url.searchParams.has('token')) {
                url.searchParams.delete('token');
                history.replaceState(null, '', url.toString());
            }
        }

        function checkAutoReconnect() {
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (!urlToken) return null;
            try {
                const prevRaw = localStorage.getItem('okaosReconnect');
                if (!prevRaw) return null;
                const prev = JSON.parse(prevRaw);
                if (prev.token === urlToken) return prev.songId;
            } catch (err) {}
            return null;
        }

        function reflectSongTitleInUrl(name) {
            if (!name) return;
            const url = new URL(window.location.href);
            url.searchParams.set('title', name);
            history.replaceState(null, '', url.toString());
        }

        async function initEngine() {
            let songId = resolveSongSelection();
            if (!songId) songId = checkAutoReconnect();
            if (!songId) {
                showNoSongState();
                return;
            }
            const num = extractNumber(songId);
            if (!num) {
                showNoSongState();
                return;
            }
            await loadSong(num, songId);
        }

        async function loadSong(num, rawId) {
            const url = buildMapUrl(num);
            try {
                const res = await fetch(url, { cache: 'no-store' });
                if (!res.ok) throw new Error('http-' + res.status);
                const data = await res.json();
                let notesArr = Array.isArray(data.notes) ? data.notes : null;
                if (!notesArr && data.map) {
                    const mapRes = await fetch(data.map, { cache: 'no-store' });
                    if (!mapRes.ok) throw new Error('http-' + mapRes.status);
                    const mapData = await mapRes.json();
                    notesArr = Array.isArray(mapData) ? mapData : (Array.isArray(mapData.notes) ? mapData.notes : null);
                }
                if (!notesArr || notesArr.length === 0) throw new Error('sin-notas');
                applySongData(data, notesArr);
                clearReconnect();
            } catch (err) {
                const token = generateToken();
                const attempts = saveReconnect(rawId, token);
                if (attempts < MAX_RECONNECT_ATTEMPTS) {
                    setTimeout(() => window.location.reload(), 700);
                } else {
                    clearReconnect();
                    showLoadError();
                }
            }
        }

        function applySongData(data, notesArr) {
            ENGINE.songData = data;
            ENGINE.notes = notesArr
                .filter(n => typeof n.time === 'number' && typeof n.col === 'number' && n.col >= 0 && n.col <= 3)
                .map(n => ({ time: n.time, col: n.col, spawned: false, judged: false, el: null, fadeTimeoutId: null }))
                .sort((a, b) => a.time - b.time);

            const rawSpeed = (typeof data.velocidad === 'number' && data.velocidad > 0) ? data.velocidad : 1;
            ENGINE.travelMs = Math.min(MAX_TRAVEL_MS, Math.max(MIN_TRAVEL_MS, BASE_TRAVEL_MS / rawSpeed));

            const displayName = data.nombre || 'Unknown Track';
            songTitle.textContent = displayName;
            songArt.src = data.portada || data.fondo || '../img/logo.jpg';
            reflectSongTitleInUrl(displayName);

            if (data.fondo) {
                document.body.style.background = "url('" + data.fondo + "') no-repeat center center/cover";
                lobbyViewport.style.background = "url('" + data.fondo + "') no-repeat center center/cover";
            }

            if (data.video) {
                bgVideo.src = data.video;
                bgVideo.style.display = 'block';
                bgVideo.pause();
                bgVideo.currentTime = 0;
            } else {
                bgVideo.removeAttribute('src');
                bgVideo.style.display = 'none';
            }

            if (data.audio) {
                bgMusic.src = data.audio;
            }

            ENGINE.ready = true;
        }

        function showLoadError() {
            ENGINE.ready = false;
            songTitle.textContent = 'Error al cargar la canción';
            songArt.src = '../img/logo.jpg';
        }

        function showNoSongState() {
            ENGINE.ready = false;
            songTitle.textContent = 'Sin canción seleccionada';
            songArt.src = '../img/logo.jpg';
        }

        function measureColumns() {
            ENGINE.columnRects = trackColumns.map((col, i) => {
                const colRect = col.getBoundingClientRect();
                const recRect = receptors[i].getBoundingClientRect();
                const receptorY = (recRect.top + recRect.height / 2) - colRect.top;
                return { height: colRect.height, receptorY: receptorY };
            });
        }

        const columnResizeObserver = new ResizeObserver(() => measureColumns());
        columnResizeObserver.observe(document.querySelector('.tracks-container'));

        function spawnNote(note) {
            const el = document.createElement('div');
            el.className = 'note ' + DIR_NOTE_CLASS[note.col];
            const arrow = document.createElement('div');
            arrow.className = 'arrow-icon ' + DIR_ARROW_CLASS[note.col];
            el.appendChild(arrow);
            trackColumns[note.col].appendChild(el);
            note.el = el;
            note.spawned = true;
            positionNote(note, 0);
        }

        function positionNote(note, progress) {
            const rect = ENGINE.columnRects[note.col];
            if (!rect || !note.el) return;
            const bottomY = rect.height;
            const y = bottomY + (rect.receptorY - bottomY) * progress;
            note.el.style.transform = 'translate3d(-50%, ' + y + 'px, 0)';
        }

        function resolveNote(note) {
            if (note.judged) return;
            note.judged = true;

            const el = note.el;
            if (!el) return;

            const rect = ENGINE.columnRects[note.col];
            const exitY = rect ? (rect.receptorY - rect.height * 0.35 - 90) : -90;
            el.style.transition = 'transform ' + EXIT_FADE_MS + 'ms ease-out, opacity ' + EXIT_FADE_MS + 'ms ease-out';
            el.style.transform = 'translate3d(-50%, ' + exitY + 'px, 0)';
            el.style.opacity = '0';

            note.fadeTimeoutId = setTimeout(() => {
                el.remove();
                if (note.el === el) note.el = null;
                note.fadeTimeoutId = null;
            }, EXIT_FADE_MS + 60);
        }

        function clearNoteImmediately(note) {
            if (note.fadeTimeoutId) {
                clearTimeout(note.fadeTimeoutId);
                note.fadeTimeoutId = null;
            }
            if (note.el) {
                note.el.remove();
                note.el = null;
            }
            note.judged = true;
        }

        function getNowMs() {
            if (ENGINE.audioStarted) {
                return bgMusic.currentTime * 1000;
            }
            const elapsed = performance.now() - ENGINE.clockStartPerf;
            return elapsed - ENGINE.travelMs;
        }

        function triggerHit(col) {
            receptors[col].classList.add('active');
            setTimeout(() => receptors[col].classList.remove('active'), 80);
        }

        function gameLoop() {
            if (!state.isPlaying) {
                ENGINE.rafId = requestAnimationFrame(gameLoop);
                return;
            }

            measureColumns();
            const nowMs = getNowMs();

            if (!ENGINE.audioStarted && nowMs >= 0) {
                ENGINE.audioStarted = true;
                bgMusic.currentTime = 0;
                bgMusic.play().catch(() => {});
            }

            for (const note of ENGINE.notes) {
                if (note.judged && !note.el) continue;
                const spawnAt = note.time - ENGINE.travelMs;
                if (!note.spawned && nowMs >= spawnAt) {
                    spawnNote(note);
                }
                if (note.spawned && note.el && !note.judged) {
                    const progress = (nowMs - spawnAt) / ENGINE.travelMs;
                    positionNote(note, Math.min(progress, 1.4));

                    if (nowMs >= note.time) {
                        triggerHit(note.col);
                        resolveNote(note);
                    }
                }
            }

            ENGINE.rafId = requestAnimationFrame(gameLoop);
        }

        bgMusic.addEventListener('ended', () => {
            if (state.isPlaying) {
                state.isPlaying = false;
                if (ENGINE.rafId) cancelAnimationFrame(ENGINE.rafId);
            }
        });

        btnRun.addEventListener('click', () => {
            if (!ENGINE.ready) return;
            btnRun.classList.add('selected-active');
            setTimeout(() => {
                btnRun.classList.remove('selected-active');
                lobbyViewport.style.display = 'none';
                gameViewport.classList.add('active');
                startCountdown();
            }, 400);
        });

        function startCountdown() {
            if (ENGINE.rafId) {
                cancelAnimationFrame(ENGINE.rafId);
                ENGINE.rafId = null;
            }
            bgMusic.pause();
            bgMusic.currentTime = 0;
            ENGINE.audioStarted = false;

            if (bgVideo.style.display !== 'none') {
                bgVideo.pause();
                bgVideo.currentTime = 0;
            }

            ENGINE.notes.forEach(n => clearNoteImmediately(n));
            ENGINE.notes.forEach(n => {
                n.spawned = false;
                n.judged = false;
            });

            state.isPlaying = false;

            countdownOverlay.style.display = 'flex';
            let count = 3;

            function runStep() {
                if (count > 0) {
                    countdownText.textContent = count;
                } else if (count === 0) {
                    countdownText.textContent = "¡Go!";
                } else {
                    countdownOverlay.style.display = 'none';
                    startGame();
                    return;
                }

                countdownText.classList.remove('pop');
                void countdownText.offsetWidth;
                countdownText.classList.add('pop');

                count--;
                setTimeout(runStep, 1000);
            }

            runStep();
        }

        function startGame() {
            state.isPlaying = true;
            measureColumns();
            bgMusic.pause();
            bgMusic.currentTime = 0;
            ENGINE.audioStarted = false;
            ENGINE.clockStartPerf = performance.now();

            if (bgVideo.style.display !== 'none') {
                bgVideo.currentTime = 0;
                bgVideo.play().catch(() => {});
            }

            ENGINE.rafId = requestAnimationFrame(gameLoop);
        }

        initEngine();
    </script>
</body>
