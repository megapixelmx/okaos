<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link class="mcpixel-logo-ref" rel="icon" type="image/jpg" href="../img/logo.jpg">
    <title>OKAOs - No Disponible</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', 'Impact', sans-serif;
            user-select: none;
            -webkit-user-drag: none;
        }
        img {
            pointer-events: none;
        }
        body {
            background: url('../img/fn/f5.jpg') no-repeat center center/cover;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 2vh 4vw;
        }
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 8vh;
            animation: slideDown 0.6s cubic-bezier(0.25, 1, 0.5, 1) both;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .brand-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: #ffffff;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px #000000;
            transform: skewX(-10deg);
        }
        .difficulty-menu {
            display: flex;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 20px;
            transform: skewX(-15deg);
            border: 3px solid #ffffff;
        }
        .diff-btn {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            padding: 5px 15px;
            font-size: 1.1rem;
            text-transform: uppercase;
            transform: skewX(15deg);
            transition: color 0.1s, background 0.1s;
            cursor: pointer;
        }
        .diff-btn-home {
            background: #ff3366;
        }
        .diff-btn-home:hover {
            background: #ffffff;
            color: #ff3366;
        }
        .main-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 84vh;
            margin-top: 2vh;
            align-items: center;
            justify-content: center;
        }
        .error-panel {
            background: rgba(20, 20, 20, 0.85);
            border: 4px solid #ffffff;
            box-shadow: -8px 8px 0px rgba(0,0,0,0.5);
            padding: 40px;
            color: #ffffff;
            transform: skewX(-4deg);
            max-width: 600px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            animation: panelSlideIn 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes panelSlideIn {
            to { opacity: 1; }
        }
        .error-icon {
            width: 120px;
            height: 120px;
            object-fit: contain;
            transform: skewX(4deg);
            filter: drop-shadow(-4px 4px 0px rgba(0,0,0,0.5));
        }
        .error-title {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transform: skewX(4deg);
            color: #ffcc00;
            text-shadow: 3px 3px 0px #000000;
        }
        .error-description {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.15rem;
            line-height: 1.6;
            transform: skewX(4deg);
            color: #e0e0e0;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header-nav">
        <div class="brand-title">OKAOs</div>
        <div class="difficulty-menu">
            <a href="/" class="diff-btn diff-btn-home">Inicio</a>
        </div>
    </div>

    <div class="main-layout">
        <div class="error-panel">
            <img src="../img/icons/ic3.png" class="error-icon" alt="No Disponible">
            <h1 class="error-title">No Disponible</h1>
            <p class="error-description">
                ¡Oops! Que inesperado al parecer la opción de Perfil No esta disponible en esta versión, Esto puede debido a la Version de Prueba o una versión Beta Actual que por lo General No viene completa.
            </p>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSelectSound() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        }

        document.querySelectorAll('.diff-btn').forEach(el => {
            el.addEventListener('click', () => {
                playSelectSound();
            });
        });

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 's' || e.key === 'u')) {
                e.preventDefault();
            }
        });
    </script>

</body>
</html>
