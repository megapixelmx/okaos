<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKAOs - Añadir Canciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <link class="mcpixel-logo-ref" rel="icon" type="image/jpg" href="../img/logo.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', 'Impact', sans-serif;
            user-select: none;
            -webkit-user-drag: none;
        }
        img {
            pointer-events: none;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 2vh 4vw;
            transition: background 0.3s ease;
            background: #0d0e12;
        }
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #0d0e12;
        }
        #bg-element {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
        }
        #bg-element.fade-out {
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }
        #bg-element.img-pop {
            animation: imgPopAnim 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes imgPopAnim {
            from { transform: scale(1.05); opacity: 0.7; }
            to { transform: scale(1); opacity: 1; }
        }
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 8vh;
            animation: slideDown 0.6s cubic-bezier(0.25, 1, 0.5, 1) both;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .brand-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: #ffffff;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px #000000;
            transform: skewX(-10deg);
        }
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .difficulty-menu {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 20px;
            transform: skewX(-15deg);
            border: 3px solid #ffffff;
        }
        .diff-btn {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            padding: 5px 15px;
            font-size: 1.1rem;
            text-transform: uppercase;
            transform: skewX(15deg);
            transition: color 0.1s, background 0.1s;
            cursor: pointer;
        }
        .diff-btn.active, .diff-btn:hover {
            color: #000000;
            background: #ffcc00;
        }
        .diff-btn-home {
            background: #ff3366;
        }
        .diff-btn-home:hover {
            background: #ffffff;
            color: #ff3366;
        }
        .search-bar-container {
            position: relative;
            width: 260px;
            animation: slideLeft 0.8s cubic-bezier(0.25, 1, 0.5, 1) 0.2s both;
        }
        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .search-input {
            width: 100%;
            padding: 8px 15px;
            padding-right: 40px;
            background: rgba(20, 20, 20, 0.85);
            border: 3px solid #ffffff;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: bold;
            outline: none;
            box-shadow: -4px 4px 0px rgba(0,0,0,0.5);
            transform: skewX(-12deg);
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Fredoka', sans-serif;
        }
        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%) skewX(-12deg);
            width: 18px;
            height: 18px;
            fill: #ffffff;
            pointer-events: none;
        }
        .main-layout {
            display: flex;
            width: 100%;
            height: 84vh;
            margin-top: 2vh;
            gap: 4vw;
            overflow: hidden;
        }
        .grid-panel {
            width: 61%;
            height: 100%;
            overflow-y: scroll;
            scrollbar-width: none;
            -ms-overflow-style: none;
            pointer-events: auto;
            padding-right: 15px;
            padding-bottom: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            grid-auto-rows: max-content;
            gap: 25px;
        }
        .grid-panel::-webkit-scrollbar {
            display: none;
        }
        .song-card {
            aspect-ratio: 1/1;
            background: #141414;
            border: 4px solid #ffffff;
            box-shadow: -5px 5px 0px rgba(0,0,0,0.5);
            cursor: pointer;
            overflow: hidden;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            transition: transform 0.1s, border-color 0.1s;
        }
        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }
        .song-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .song-card:hover, .song-card.active {
            border-color: #ffcc00;
            transform: scale(1.04) translateY(-3px) !important;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            grid-column: 1 / -1;
            color: #fff;
            text-align: center;
            padding: 40px 0;
        }
        .empty-state img {
            width: 120px;
            margin-bottom: 20px;
        }
        .phone-panel {
            width: 35%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }
        .phone-wrapper {
            width: 340px;
            height: 580px;
            background: #222533;
            border: 6px solid #444961;
            border-radius: 36px;
            padding: 24px;
            box-shadow: -20px 20px 30px rgba(0,0,0,0.7), inset 0 0 15px rgba(0,0,0,0.5);
            transform: translateY(100vh) rotateY(342deg) rotateX(12deg) rotateZ(-4deg);
            animation: phoneSmoothIn 1.2s cubic-bezier(0.25, 1, 0.5, 1) both;
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: #ffffff;
            position: relative;
        }
        @keyframes phoneSmoothIn {
            to { transform: translateY(0) rotateY(-18deg) rotateX(12deg) rotateZ(-4deg); }
        }
        .phone-wrapper::before {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%);
            border-radius: 30px;
            pointer-events: none;
        }
        .phone-preview-img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border: 4px solid #ffffff;
            background: #141414;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        .phone-preview-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .phone-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .phone-title {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }
        .phone-author {
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            color: #a0a5c0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .phone-details-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.25);
            padding: 15px;
            border-radius: 14px;
            flex: 1;
        }
        .phone-detail-item {
            font-family: 'Fredoka', sans-serif;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            color: #d1d5db;
        }
        .phone-detail-item span:last-child {
            font-weight: 700;
            color: #ffcc00;
        }
        .phone-action-btn {
            width: 100%;
            height: 50px;
            background: #00cc88;
            border: 3px solid #ffffff;
            border-radius: 12px;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s, background-color 0.1s;
            text-decoration: none;
            text-transform: uppercase;
        }
        .phone-action-btn.remove {
            background: #ff3366;
        }
        .phone-action-btn:hover {
            background: #ffffff;
            color: #00cc88;
            transform: scale(1.02);
        }
        .phone-action-btn.remove:hover {
            color: #ff3366;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="bg-container">
        <img id="bg-element" src="../img/fn/f4.jpg">
    </div>

    <div class="header-nav">
        <div class="brand-title">OKAOs</div>
        <div class="nav-controls">
            <div class="difficulty-menu" id="diffMenu">
                <a href="../index.html" class="diff-btn diff-btn-home" id="homeBtn">Inicio</a>
                <a class="diff-btn active" data-diff="All">All</a>
                <a class="diff-btn" data-diff="Easy">Easy</a>
                <a class="diff-btn" data-diff="Medium">Medium</a>
                <a class="diff-btn" data-diff="Hard">Hard</a>
                <a class="diff-btn" data-diff="Impossible">Impossible</a>
            </div>
            <div class="search-bar-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Buscar canción o creador...">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="grid-panel" id="gridPanel"></div>
        <div class="phone-panel">
            <div class="phone-wrapper">
                <div class="phone-preview-img-box">
                    <img id="phoneImg" src="" alt="">
                </div>
                <div class="phone-meta">
                    <div class="phone-title" id="phoneTitle">Selecciona una</div>
                    <div class="phone-author" id="phoneAuthor">canción para ver</div>
                </div>
                <div class="phone-details-list">
                    <div class="phone-detail-item"><span>Duración:</span><span id="phoneDuration">--:--</span></div>
                    <div class="phone-detail-item"><span>Dificultad:</span><span id="phoneDiff">--</span></div>
                    <div class="phone-detail-item"><span>Puntos:</span><span id="phonePoints">---</span></div>
                </div>
                <button class="phone-action-btn" id="addTrackBtn">Añadir</button>
            </div>
        </div>
    </div>

    <script>
        const audioPlayer = new Audio();
        const bgContainer = document.getElementById('bg-container');
        const gridPanel = document.getElementById('gridPanel');
        const phoneImg = document.getElementById('phoneImg');
        const phoneTitle = document.getElementById('phoneTitle');
        const phoneAuthor = document.getElementById('phoneAuthor');
        const phoneDuration = document.getElementById('phoneDuration');
        const phoneDiff = document.getElementById('phoneDiff');
        const phonePoints = document.getElementById('phonePoints');
        const addTrackBtn = document.getElementById('addTrackBtn');
        const searchInput = document.getElementById('searchInput');
        const homeBtn = document.getElementById('homeBtn');

        let allSongs = [];
        let currentFilter = 'All';
        let selectedSong = null;

        async function loadSongs() {
            let i = 1;
            while (true) {
                try {
                    const response = await fetch(`../mapped/m${i}.json`);
                    if (!response.ok) break;
                    const data = await response.json();
                    allSongs.push({ ...data, id: i });
                    i++;
                } catch (e) { break; }
            }
            renderSongs();
        }

        function updateBackground(song) {
            const oldBg = document.getElementById('bg-element');
            
            if (song.video) {
                if (oldBg) {
                    oldBg.classList.add('fade-out');
                    setTimeout(() => {
                        oldBg.remove();
                        createNewBgElement(song);
                    }, 500);
                } else {
                    createNewBgElement(song);
                }
            } else {
                if (oldBg) oldBg.remove();
                createNewBgElement(song);
            }
        }

        function createNewBgElement(song) {
            let newBg;

            if (song.video) {
                newBg = document.createElement('video');
                newBg.id = 'bg-element';
                newBg.autoplay = true;
                newBg.loop = true;
                newBg.muted = true;
                newBg.playsInline = true;
                newBg.classList.add('fade-out');
                newBg.src = song.video;
                
                newBg.oncanplaythrough = () => {
                    newBg.classList.remove('fade-out');
                };
            } else {
                newBg = document.createElement('img');
                newBg.id = 'bg-element';
                newBg.className = 'img-pop';
                newBg.src = song.fondo;
            }

            bgContainer.appendChild(newBg);
        }

        function crossfade(audioSource) {
            if (audioPlayer.paused) {
                audioPlayer.src = audioSource;
                audioPlayer.volume = 1;
                audioPlayer.play();
            } else {
                let fadeOut = setInterval(() => {
                    if (audioPlayer.volume > 0.1) {
                        audioPlayer.volume -= 0.1;
                    } else {
                        audioPlayer.pause();
                        audioPlayer.src = audioSource;
                        audioPlayer.volume = 1;
                        audioPlayer.play();
                        clearInterval(fadeOut);
                    }
                }, 50);
            }
        }

        function renderSongs() {
            gridPanel.innerHTML = '';
            const filtered = allSongs.filter(s => 
                (currentFilter === 'All' || s.dificultad === currentFilter) &&
                (s.nombre.toLowerCase().includes(searchInput.value.toLowerCase()) || s.autor.toLowerCase().includes(searchInput.value.toLowerCase()))
            );

            if (filtered.length === 0) {
                gridPanel.innerHTML = `<div class="empty-state"><img src="../img/icons/ic9.png"><h2>No ahí música</h2><p>Aun no ahi musica que puedas encontrar por aqui</p></div>`;
                return;
            }

            filtered.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `<img src="${song.portada || song.fondo}" alt="${song.nombre}">`;
                card.onclick = () => {
                    document.querySelectorAll('.song-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    selectedSong = song;
                    updateBackground(song);
                    phoneImg.src = song.portada || song.fondo;
                    phoneTitle.textContent = song.nombre;
                    phoneAuthor.textContent = song.autor;
                    phoneDuration.textContent = song.duracion;
                    phoneDiff.textContent = song.dificultad;
                    phonePoints.textContent = song.puntos;
                    updateBtnState();
                    crossfade(song.audio);
                };
                gridPanel.appendChild(card);
            });
        }

        function updateBtnState() {
            const library = JSON.parse(localStorage.getItem('mySongs') || '[]');
            const isAdded = library.find(s => s.id === selectedSong.id);
            addTrackBtn.textContent = isAdded ? 'Quitar' : 'Añadir';
            addTrackBtn.className = isAdded ? 'phone-action-btn remove' : 'phone-action-btn';
        }

        addTrackBtn.onclick = () => {
            if (!selectedSong) return;
            let library = JSON.parse(localStorage.getItem('mySongs') || '[]');
            const index = library.findIndex(s => s.id === selectedSong.id);
            if (index > -1) {
                library.splice(index, 1);
            } else {
                library.push(selectedSong);
            }
            localStorage.setItem('mySongs', JSON.stringify(library));
            updateBtnState();
        };

        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.onclick = (e) => {
                if(btn.classList.contains('diff-btn-home')) return;
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-diff');
                renderSongs();
            };
        });

        homeBtn.onclick = (e) => {
            e.preventDefault();
            const targetUrl = homeBtn.getAttribute('href');
            
            if (!audioPlayer.paused && audioPlayer.volume > 0) {
                let fadeOutHome = setInterval(() => {
                    if (audioPlayer.volume > 0.05) {
                        audioPlayer.volume -= 0.05;
                    } else {
                        audioPlayer.pause();
                        clearInterval(fadeOutHome);
                        window.location.href = targetUrl;
                    }
                }, 25);
            } else {
                window.location.href = targetUrl;
            }
        };

        searchInput.oninput = renderSongs;
        loadSongs();
        window.addEventListener('keydown', (e) => { if (e.ctrlKey && (e.key === 's' || e.key === 'u')) e.preventDefault(); });
    </script>
</body>
</html>
