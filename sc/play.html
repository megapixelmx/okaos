<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKAOs</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <link class="mcpixel-logo-ref" rel="icon" type="image/jpg" href="../img/logo.jpg">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Arial Black', 'Impact', sans-serif; 
            user-select: none; 
            -webkit-user-drag: none; 
        }
        
        img { 
            pointer-events: none; 
        }
        
        body { 
            background: url('../img/fn/f2.jpg') no-repeat center center/cover; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            padding: 2vh 4vw; 
            transition: background 0.3s ease; 
            position: relative; 
        }
        
        #bg-video { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: -1; 
        }
        
        .header-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            height: 8vh; 
        }
        
        .title-panel { 
            font-family: 'Fredoka', sans-serif; 
            font-weight: 700; 
            color: #ffffff; 
            font-size: 2.5rem; 
            letter-spacing: 2px; 
            text-shadow: 3px 3px 0px #000000; 
            transform: skewX(-10deg); 
        }
        
        .difficulty-menu { 
            display: flex; 
            gap: 10px; 
            background: rgba(0, 0, 0, 0.6); 
            padding: 5px 20px; 
            transform: skewX(-15deg) translateY(-100px); 
            border: 3px solid #ffffff; 
            opacity: 0; 
            animation: slideDownDrop 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
            animation-delay: 0.2s; 
        }
        
        @keyframes slideDownDrop { 
            to { transform: skewX(-15deg) translateY(0); opacity: 1; } 
        }
        
        .diff-btn { 
            font-family: 'Fredoka', sans-serif; 
            font-weight: 700; 
            color: #ffffff; 
            text-decoration: none; 
            padding: 5px 15px; 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            transform: skewX(15deg); 
            transition: color 0.1s, background 0.1s; 
            cursor: pointer;
        }
        
        .diff-btn.active, .diff-btn:hover { 
            color: #000000; 
            background: #ffcc00; 
        }
        
        .diff-btn-home { 
            background: #ff3366; 
        }
        
        .diff-btn-home:hover { 
            background: #ffffff; 
            color: #ff3366; 
        }
        
        .main-content { 
            display: flex; 
            width: 100%; 
            height: 84vh; 
            margin-top: 2vh; 
            gap: 4vw; 
            overflow: hidden;
        }
        
        .left-panel { 
            width: 35%; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            gap: 20px; 
            position: relative; 
            height: 100%;
        }
        
        .music-preview-box { 
            width: 100%; 
            aspect-ratio: 1/1; 
            max-height: 42vh; 
            border: 6px solid #ffffff; 
            background: #141414; 
            box-shadow: -10px 10px 0px rgba(0,0,0,0.5); 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            opacity: 0; 
            transform: translateX(-150px); 
            animation: slideFromLeft 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
            animation-delay: 0.4s; 
            position: relative; 
            z-index: 5; 
        }
        
        @keyframes slideFromLeft { 
            to { transform: translateX(0); opacity: 1; } 
        }
        
        .music-preview-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .leaderboard-panel { 
            flex: 1; 
            background: #141414; 
            border: 5px solid #ffffff; 
            box-shadow: -8px 8px 0px rgba(0,0,0,0.5); 
            padding: 20px; 
            color: #ffffff; 
            transform: skewX(-4deg) translateY(-100%); 
            opacity: 0; 
            z-index: 1; 
            animation: slideFromBehind 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
            animation-delay: 0.8s; 
        }
        
        @keyframes slideFromBehind { 
            to { transform: skewX(-4deg) translateY(0); opacity: 1; } 
        }
        
        .leaderboard-title { 
            font-size: 1.4rem; 
            border-bottom: 3px solid #ffffff; 
            padding-bottom: 5px; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transform: skewX(4deg); 
        }
        
        .stats-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            transform: skewX(4deg); 
        }
        
        .stat-item { 
            font-family: 'Fredoka', sans-serif; 
            font-size: 1.1rem; 
            display: flex; 
            justify-content: space-between; 
        }
        
        .stat-item span:last-child { 
            font-weight: 700; 
            color: #ffcc00; 
        }
        
        .right-panel { 
            width: 61%; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            justify-content: flex-start; 
            padding-left: 20px; 
            padding-right: 10px;
            padding-top: 10px;
            padding-bottom: 20px;
            overflow-y: auto; 
            overflow-x: hidden;
            max-height: 100%;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .right-panel::-webkit-scrollbar {
            display: none;
        }
        
        .track-item { 
            display: flex; 
            align-items: center; 
            background: #1c1c1c; 
            border: 4px solid #ffffff; 
            padding: 12px 20px; 
            color: #ffffff; 
            cursor: pointer; 
            box-shadow: -6px 6px 0px rgba(0,0,0,0.6); 
            transform: skewX(-12deg) rotate(-2deg) translateX(200%) scale(0.4); 
            opacity: 0; 
            transition: transform 0.1s, background 0.1s, color 0.1s; 
            width: 90%; 
            align-self: flex-end; 
            gap: 20px; 
            position: relative; 
            animation: jumpFromRight 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            flex-shrink: 0;
        }
        
        @keyframes jumpFromRight { 
            0% { transform: skewX(-12deg) rotate(-2deg) translateX(200%) scale(0.4); opacity: 0; } 
            70% { transform: skewX(-12deg) rotate(-2deg) translateX(-15px) scale(1.05); opacity: 1; } 
            100% { transform: skewX(-12deg) rotate(-2deg) translateX(0) scale(1); opacity: 1; } 
        }
        
        .track-item:hover, .track-item.selected { 
            background: #ffcc00; 
            color: #000000; 
            transform: skewX(-12deg) rotate(-2deg) scale(1.02) !important; 
        }
        
        .track-img-wrapper { 
            width: 90px; 
            height: 90px; 
            border: 4px solid #ffffff; 
            overflow: visible; 
            background: #555555; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transform: skewX(12deg); 
            flex-shrink: 0; 
            box-shadow: -4px 4px 0px rgba(0,0,0,0.5); 
            margin-left: -55px; 
            transition: border-color 0.1s; 
            z-index: 10; 
        }
        
        .track-img-wrapper img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .track-info { 
            transform: skewX(12deg); 
            display: flex; 
            flex-direction: column; 
            gap: 2px; 
            padding-left: 10px; 
            overflow: hidden;
            width: 100%;
        }
        
        .track-name { 
            font-size: 1.4rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            line-height: 1.2; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
        
        .track-author { 
            font-family: 'Fredoka', sans-serif; 
            font-size: 0.95rem; 
            opacity: 0.9; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
        
        .loading-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: #000000; 
            z-index: 9999; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 30px; 
            clip-path: circle(0% at 50% 50%); 
        }
        
        .loading-overlay.active { 
            display: flex; 
            animation: irisOpen 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
        }
        
        @keyframes irisOpen { 
            to { clip-path: circle(150% at 50% 50%); } 
        }
        
        .loading-content-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 30px; 
            opacity: 0; 
        }
        
        .loading-content-wrapper.show { 
            opacity: 1; 
            transition: opacity 0.3s ease; 
        }
        
        .loading-gif-container { 
            width: 125px; 
            height: 125px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .loading-gif-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
        
        .loading-text { 
            font-family: 'Fredoka', sans-serif; 
            font-weight: 700; 
            font-size: 2.2rem; 
            color: #ffffff; 
            letter-spacing: 2px; 
            text-shadow: 3px 3px 0px #141414; 
            min-width: 220px; 
            text-align: center; 
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="bg-container"></div>
    <div class="header-nav">
        <div class="title-panel">OKAOs</div>
        <div class="difficulty-menu" id="diffMenu">
            <a href="/" class="diff-btn diff-btn-home">Inicio</a>
            <span class="diff-btn active" data-diff="All">All</span>
            <span class="diff-btn" data-diff="Easy">Easy</span>
            <span class="diff-btn" data-diff="Medium">Medium</span>
            <span class="diff-btn" data-diff="Hard">Hard</span>
            <span class="diff-btn" data-diff="Impossible">Impossible</span>
        </div>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <div class="music-preview-box">
                <img id="previewImage" src="" alt="" style="display: none;">
            </div>
            <div class="leaderboard-panel">
                <div class="leaderboard-title">Información</div>
                <div class="stats-list">
                    <div class="stat-item"><span>Duración:</span><span id="statDuration">--:--</span></div>
                    <div class="stat-item"><span>Dificultad:</span><span id="statDifficulty">--</span></div>
                    <div class="stat-item"><span>Puntuación:</span><span id="statScore">No definida</span></div>
                    <div class="stat-item"><span>Estrellas:</span><span id="statStars">No Definidas</span></div>
                    <div class="stat-item"><span>Puntos:</span><span id="statPoints">---</span></div>
                </div>
            </div>
        </div>
        <div class="right-panel" id="rightPanel"></div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content-wrapper" id="loadingContent">
            <div class="loading-gif-container"><img src="../img/icons/ic2.gif" alt="Cargando"></div>
            <div class="loading-text" id="loadingText">Cargando</div>
        </div>
    </div>

    <script>
        const rightPanel = document.getElementById('rightPanel');
        const bgContainer = document.getElementById('bg-container');
        const previewImage = document.getElementById('previewImage');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingContent = document.getElementById('loadingContent');
        const loadingText = document.getElementById('loadingText');
        const diffMenu = document.getElementById('diffMenu');
        const audioPlayer = new Audio();
        const library = JSON.parse(localStorage.getItem('mySongs') || '[]');
        let fadeInterval = null;
        let currentDifficulty = 'All';

        function playWithFade(src) {
            if (fadeInterval) {
                clearInterval(fadeInterval);
            }

            if (!audioPlayer.paused && audioPlayer.src) {
                let currentVolume = audioPlayer.volume;
                fadeInterval = setInterval(() => {
                    if (currentVolume > 0.05) {
                        currentVolume -= 0.05;
                        audioPlayer.volume = currentVolume;
                    } else {
                        clearInterval(fadeInterval);
                        audioPlayer.pause();
                        startNewTrack(src);
                    }
                }, 20);
            } else {
                startNewTrack(src);
            }
        }

        function startNewTrack(src) {
            audioPlayer.src = src;
            audioPlayer.volume = 0;
            audioPlayer.play().then(() => {
                let currentVolume = 0;
                fadeInterval = setInterval(() => {
                    if (currentVolume < 0.95) {
                        currentVolume += 0.05;
                        audioPlayer.volume = currentVolume;
                    } else {
                        audioPlayer.volume = 1;
                        clearInterval(fadeInterval);
                    }
                }, 20);
            }).catch(() => {});
        }

        function renderSongs(difficulty) {
            rightPanel.innerHTML = '';
            
            const filteredSongs = library.filter(song => {
                if (difficulty.trim().toLowerCase() === 'all') return true;
                const songDiff = String(song.dificultad).trim().toLowerCase();
                const targetDiff = difficulty.trim().toLowerCase();
                return songDiff === targetDiff;
            });

            filteredSongs.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = 'track-item';
                item.style.animationDelay = `${0.5 + (index * 0.15)}s`;
                item.innerHTML = `
                    <div class="track-img-wrapper"><img src="${song.portada || song.fondo}"></div>
                    <div class="track-info">
                        <div class="track-name">${song.nombre}</div>
                        <div class="track-author">${song.autor}</div>
                    </div>`;

                item.onclick = () => {
                    if (item.classList.contains('selected')) {
                        localStorage.setItem('selectedSong', JSON.stringify(song));
                        localStorage.setItem('selectedSongId', song.id);
                        
                        if (fadeInterval) clearInterval(fadeInterval);
                        audioPlayer.pause();
                        
                        loadingOverlay.style.display = 'flex';
                        setTimeout(() => loadingOverlay.classList.add('active'), 10);
                        setTimeout(() => { loadingOverlay.style.clipPath = 'none'; loadingContent.classList.add('show'); }, 600);
                        let dotCount = 0;
                        const interval = setInterval(() => { dotCount = (dotCount + 1) % 4; loadingText.textContent = "Cargando" + ".".repeat(dotCount); }, 400);
                        setTimeout(() => { clearInterval(interval); window.location.href = "../play/run.html"; }, 3000);
                        return;
                    }
                    document.querySelectorAll('.track-item').forEach(t => t.classList.remove('selected'));
                    item.classList.add('selected');
                    
                    playWithFade(song.audio);
                    
                    if (song.video) {
                        bgContainer.innerHTML = `<video id="bg-video" autoplay loop muted src="${song.video}"></video>`;
                    } else {
                        bgContainer.innerHTML = '';
                        document.body.style.background = `url('${song.fondo}') no-repeat center center/cover`;
                    }
                    
                    previewImage.src = song.portada || song.fondo;
                    previewImage.style.display = 'block';
                    document.getElementById('statDuration').textContent = song.duracion;
                    document.getElementById('statDifficulty').textContent = song.dificultad;
                    document.getElementById('statPoints').textContent = song.puntos;
                };
                rightPanel.appendChild(item);
            });
        }

        diffMenu.querySelectorAll('.diff-btn').forEach(btn => {
            if(btn.hasAttribute('data-diff')) {
                btn.onclick = () => {
                    diffMenu.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDifficulty = btn.getAttribute('data-diff');
                    renderSongs(currentDifficulty);
                };
            }
        });

        renderSongs(currentDifficulty);

        window.addEventListener('keydown', (e) => { if (e.ctrlKey && (e.key === 's' || e.key === 'u')) e.preventDefault(); });
    </script>
</body>
</html>
